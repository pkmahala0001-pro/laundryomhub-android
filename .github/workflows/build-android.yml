      - name: Print keystore fingerprint
        run: |
          echo "========================================"
          echo "SHA-256 FINGERPRINT:"
          keytool -list -v -keystore $GITHUB_WORKSPACE/android.keystore \
            -alias laundryomhub -storepass laundry2024 2>/dev/null | grep "SHA256:"
          echo "========================================"
          echo "UPLOAD CERTIFICATE PEM (for Play Console key reset):"
          echo "========================================"
          keytool -export -alias laundryomhub \
            -keystore $GITHUB_WORKSPACE/android.keystore \
            -storepass laundry2024 \
            -file /tmp/upload_cert.der
          openssl x509 -inform DER -in /tmp/upload_cert.der -out /tmp/upload_cert.pem
          cat /tmp/upload_cert.pem
          echo "========================================"
