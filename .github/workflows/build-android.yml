name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download and resize icons
        run: |
          sudo apt-get install -y imagemagick curl
          curl -L "https://laundryomhub.com/icon-512.png" -o /tmp/icon.png 2>/dev/null || \
            convert -size 512x512 xc:#16a34a /tmp/icon.png
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          convert /tmp/icon.png -resize 72x72   app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert /tmp/icon.png -resize 96x96   app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Setup Gradle wrapper
        run: gradle wrapper --gradle-version 8.1.1

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias laundryomhub -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore $GITHUB_WORKSPACE/android.keystore \
            -storepass laundry2024 -keypass laundry2024 \
            -dname "CN=LaundryOmHub,O=LaundryOmHub,L=Jaipur,S=Rajasthan,C=IN" \
            -noprompt

      - name: Build signed AAB
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android.keystore \
            -Pandroid.injected.signing.store.password=laundry2024 \
            -Pandroid.injected.signing.key.alias=laundryomhub \
            -Pandroid.injected.signing.key.password=laundry2024

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: LaundryOmHub-release
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload Keystore
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore
          path: ${{ github.workspace }}/android.keystore
          retention-days: 30
